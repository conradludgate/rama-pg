; rama-pg pgbouncer-like example configuration.
; Run with:  cargo run -p pgbouncer -- pgbouncer.ini

[databases]
; client database  ->  backend connection string
; `*` is the catch-all backend (and the pg_authid source for SCRAM verifiers).
* = host=127.0.0.1 port=5434

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; session | transaction | statement
pool_mode = transaction
default_pool_size = 10

; only SCRAM is implemented; verifiers are read from pg_authid on demand,
; using a superuser admin connection (auth_user / auth_dbname).
auth_type = scram-sha-256
auth_user = postgres
auth_dbname = postgres
